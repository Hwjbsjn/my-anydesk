name: Windows RDP via Ngrok

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Setup Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          net user runneradmin "Abdu1234@"
          add-localgroupmember -group "Remote Management Users" -member "runneradmin"
          
      - name: 2. Install Ngrok
        run: |
          curl -L -o ngrok.zip https://bin.equinox.io/c/b34edq6tiW5/ngrok-v3-stable-windows-amd64.zip
          Expand-Archive ngrok.zip
          
      - name: 3. Start Connection
        run: |
          ./ngrok.exe config add-authtoken 3BxZEFeh2YvU8EpfLgxMSNrQIIp_73TkNgdBFJq5UpgnZU2ye
          Start-Process ./ngrok.exe -ArgumentList "tcp 3389"
          Start-Sleep -Seconds 15
          $tunnels = Invoke-WebRequest http://localhost:4040/api/tunnels | ConvertFrom-Json
          $address = $tunnels.tunnels[0].public_url
          Write-Host "========================================"
          Write-Host "SUCCESS! CONNECT TO: $address"
          Write-Host "USER: runneradmin"
          Write-Host "PASS: Abdu1234@"
          Write-Host "========================================"
          
      - name: 4. Keep Alive
        run: |
          $timeout = (Get-Date).AddHours(6)
          while ((Get-Date) -lt $timeout) { Start-Sleep 60 }
