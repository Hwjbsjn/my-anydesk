name: AnyDesk Ultimate Fix

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Install & Get ID
        shell: powershell
        run: |
          # تحميل البرنامج
          Invoke-WebRequest -Uri "https://download.anydesk.com/AnyDesk.exe" -OutFile "AnyDesk.exe"
          
          # تثبيت صامت في مسار النظام
          Start-Process "./AnyDesk.exe" -ArgumentList "--install C:\AnyDesk --start-with-win --silent" -Wait
          
          # انتظار 30 ثانية عشان السيرفس تشتغل
          Start-Sleep -Seconds 30
          
          # تعيين كلمة المرور
          echo "MR.English2008" | & "C:\AnyDesk\AnyDesk.exe" --set-password _full_access
          
          # محاولة استخراج الـ ID بقوة
          $ID = ""
          for ($i=1; $i -le 10; $i++) {
              $ID = & "C:\AnyDesk\AnyDesk.exe" --get-id
              if ($ID) { break }
              Write-Host "Waiting for ID... Attempt $i"
              Start-Sleep -Seconds 10
          }
          
          Write-Host "========================================"
          Write-Host "SUCCESS! YOUR ANYDESK ID IS: $ID"
          Write-Host "PASSWORD IS: MR.English2008"
          Write-Host "========================================"
          
          # الحفاظ على الجلسة مفتوحة لمدة 6 ساعات
          $timeout = (Get-Date).AddHours(6)
          while ((Get-Date) -lt $timeout) {
              Write-Host "Session Active | ID: $ID | $(Get-Date)"
              Start-Sleep -Seconds 120
          }
